# Netlify configuration — Moca Hub satellite app (Vite SPA + Functions).

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  # Public Moca Hub base URL the SDK validates launch tokens against.
  VITE_MOCA_HUB_URL = "https://moca-central-hub.netlify.app"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# cheerio/undici are installed at runtime rather than bundled by esbuild.
[functions."extract-brand"]
  external_node_modules = ["cheerio", "undici"]

# /api/* → Netlify Functions (same convention as the Hub).
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback (must come AFTER the /api/* redirect).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ── Secrets / env (set in Netlify UI → Environment variables) ────────────────
# Frontend (exposed, VITE_ prefix):
#   VITE_MOCA_HUB_URL          Moca Hub base URL (already set above)
#   VITE_SUPABASE_URL          shared Moca Hub Supabase URL
#   VITE_SUPABASE_ANON_KEY     shared Moca Hub anon key (RLS-protected)
# Do NOT put the Supabase service_role key here — it's not used by this app.
